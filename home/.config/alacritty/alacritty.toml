[general]
live_config_reload = false

# Default colors
[colors.primary]
# hard contrast background = = '#1d2021'
background = '#282828'
# soft contrast background = = '#32302f'
foreground = '#ebdbb2'

# Normal colors
[colors.normal]
black   = '#282828'
red     = '#cc241d'
green   = '#98971a'
yellow  = '#d79921'
blue    = '#458588'
magenta = '#b16286'
cyan    = '#689d6a'
white   = '#a89984'

# Bright colors
[colors.bright]
black   = '#928374'
red     = '#fb4934'
green   = '#b8bb26'
yellow  = '#fabd2f'
blue    = '#83a598'
magenta = '#d3869b'
cyan    = '#8ec07c'
white   = '#ebdbb2'

[cursor]
blink_interval = 500
blink_timeout = 0

[env]
WINIT_X11_SCALE_FACTOR = "1.0"

[cursor.style]
blinking = "On"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ScrollLineUp"
key = "["
mods = "Alt"

[[keyboard.bindings]]
action = "ScrollLineDown"
key = "]"
mods = "Alt"

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "U"
mods = "Alt"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "D"
mods = "Alt"

[[keyboard.bindings]]
action = "ScrollToTop"
key = "G"
mods = "Alt"

[[keyboard.bindings]]
action = "ScrollToBottom"
key = "G"
mods = "Alt|Shift"

[[hints.enabled]]
command         = "xdg-open"
hyperlinks      = true
post_processing = true
persist         = false
mouse.enabled   = true
binding         = { key = "O", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩‘\\\\]+"

[[hints.enabled]]
regex = " /[0-9a-zA-Z/\\-_\\.]+(:\\d*){0,2}"
command.program = "linkhandler"
post_processing = true
mouse.enabled = true

[[hints.enabled]]
regex = "^/[0-9a-zA-Z/\\-_\\.]+(:\\d*){0,2}"
command.program = "linkhandler"
post_processing = true
mouse.enabled = true

[[hints.enabled]]
regex = "[0-9a-zA-Z/\\-_\\.]+:(\\d+)(:\\d*)?"
command.program = "linkhandler"
post_processing = true
mouse.enabled = true
